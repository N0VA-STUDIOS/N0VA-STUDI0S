<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPaint & Pixel Art Studio</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --sidebar-bg: #252526; --btn: #4a4a4a; --accent: #007acc; --text: #fff; --border: #3c3c3c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Contenedor e Interfaz de la Sidebar */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.3s ease; flex-shrink: 0; z-index: 10; }
        .sidebar.collapsed { width: 0; overflow: hidden; border-right: none; }
        .sidebar-header { padding: 15px; font-weight: bold; font-size: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Lista de Proyectos */
        .project-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .project-item { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .project-item:hover { background: #3c3c3c; border-color: #555; }
        .project-item.active { border-color: var(--accent); background: #1e3446; }
        .project-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13.5px; }
        .btn-del { background: transparent; padding: 4px; border-radius: 3px; font-size: 12px; }
        .btn-del:hover { background: #cc3333; }
        
        /* Área Principal de Trabajo */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; position: relative; }
        .toolbar { background: var(--panel); padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; width: 100%; max-width: 900px; justify-content: center; }
        .tool-group { display: flex; align-items: center; gap: 8px; background: #3c3c3c; padding: 6px 10px; border-radius: 6px; }
        
        /* Botones y Controles */
        button { background: var(--btn); color: var(--text); border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        button:hover { filter: brightness(1.2); }
        button.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        button.danger { background: #cc3333; } button.success { background: #2ea043; }
        .w-full { width: 100%; justify-content: center; }
        
        input[type="color"] { border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; background: none; }
        input[type="range"] { cursor: pointer; }

        /* Lienzo */
        .canvas-container { position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.8); border-radius: 4px; overflow: hidden; background: #fff; }
        canvas { display: block; cursor: crosshair; }
        .pixel-grid { position: absolute; inset: 0; pointer-events: none; display: none; background-image: linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .pixel-grid.active { display: block; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span>📁 Mis Proyectos</span>
            <button id="btnNewProject" title="Nuevo lienzo en blanco" style="padding:4px 8px;">➕ Nuevo</button>
        </div>
        <div class="sidebar-content">
            <button id="btnSaveProject" class="success w-full">💾 Guardar Proyecto</button>
            <div id="projectList" class="project-list">
                </div>
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <button id="btnToggleSidebar" title="Mostrar/Ocultar Proyectos">📁 Proyectos</button>
            
            <div class="tool-group" id="tools">
                <button data-tool="brush" class="tool-btn active" title="Pincel">原始 Pincel</button>
                <button data-tool="eraser" class="tool-btn" title="Borrador">🧽 Borrador</button>
                <button data-tool="pixel" class="tool-btn" title="Modo Pixel Art">👾 Pixel Art</button>
            </div>
            
            <div class="tool-group">
                <label for="colorPicker">🎨</label> <input type="color" id="colorPicker" value="#000000">
                <label for="brushSize">📏</label> <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="brushSizeLabel">5px</span>
            </div>
            
            <div class="tool-group">
                <button id="btnUndo" title="Deshacer (Ctrl+Z)">↩️ Deshacer</button>
                <button id="btnClear" class="danger" title="Limpiar lienzo completo">🗑️ Limpiar</button>
                <button id="btnSave" class="success" title="Descargar PNG local">💾 Exportar PNG</button>
            </div>
        </div>

        <div class="canvas-container">
            <div id="pixelGrid" class="pixel-grid"></div>
            <canvas id="paintCanvas" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const ui = {
            sidebar: document.getElementById('sidebar'),
            projectList: document.getElementById('projectList'),
            grid: document.getElementById('pixelGrid'),
            color: document.getElementById('colorPicker'),
            size: document.getElementById('brushSize'),
            sizeLabel: document.getElementById('brushSizeLabel'),
            tools: document.querySelectorAll('.tool-btn')
        };

        let state = { 
            drawing: false, tool: 'brush', lastX: 0, lastY: 0, pSize: 20, 
            undoStack: [], currentProject: null 
        };

        // --- MOTOR INDEXEDDB MULTIPROYECTO ---
        const dbManager = {
            async init() {
                return new Promise((resolve) => {
                    const req = indexedDB.open('ProPaintStudioDB', 2);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects');
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = () => resolve(null);
                });
            },
            async save(name, dataURL) {
                const db = await this.init();
                if (!db) return;
                return new Promise(resolve => {
                    const tx = db.transaction('projects', 'readwrite');
                    tx.objectStore('projects').put(dataURL, name);
                    tx.oncomplete = () => resolve(true);
                });
            },
            async load(name) {
                const db = await this.init();
                if (!db) return null;
                return new Promise(resolve => {
                    const req = db.transaction('projects').objectStore('projects').get(name);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async delete(name) {
                const db = await this.init();
                if (!db) return;
                return new Promise(resolve => {
                    const tx = db.transaction('projects', 'readwrite');
                    tx.objectStore('projects').delete(name);
                    tx.oncomplete = () => resolve(true);
                });
            },
            async getAllKeys() {
                const db = await this.init();
                if (!db) return [];
                return new Promise(resolve => {
                    const req = db.transaction('projects').objectStore('projects').getAllKeys();
                    req.onsuccess = () => resolve(req.result);
                });
            }
        };

        // --- SISTEMA CORE DEL LIENZO ---
        async function initCanvas() {
            const lastSession = await dbManager.load('_active_session_backup');
            if (lastSession) {
                loadImgToCanvas(lastSession);
                // Recuperar el nombre del proyecto activo previo
                const prevActive = localStorage.getItem('activeProjectName');
                if(prevActive) state.currentProject = prevActive;
            } else {
                clearCanvas(false);
            }
            renderProjects();
        }

        function loadImgToCanvas(dataURL) {
            const img = new Image();
            img.src = dataURL;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                saveState(false);
            };
        }

        const getPos = (e) => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };

        const startDrawing = (e) => {
            state.drawing = true;
            const pos = getPos(e);
            [state.lastX, state.lastY] = [pos.x, pos.y];
            draw(e);
        };

        const stopDrawing = () => {
            if (!state.drawing) return;
            state.drawing = false;
            ctx.beginPath();
            saveState(true);
        };

        const draw = (e) => {
            if (!state.drawing) return;
            const { x, y } = getPos(e);

            if (state.tool === 'pixel') {
                const px = Math.floor(x / state.pSize) * state.pSize;
                const py = Math.floor(y / state.pSize) * state.pSize;
                ctx.fillStyle = ui.color.value;
                ctx.fillRect(px, py, state.pSize, state.pSize);
            } else {
                ctx.lineWidth = ui.size.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = state.tool === 'eraser' ? '#ffffff' : ui.color.value;
                
                ctx.beginPath();
                ctx.moveTo(state.lastX, state.lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                [state.lastX, state.lastY] = [x, y];
            }
        };

        const saveState = (writeToDB = true) => {
            const url = canvas.toDataURL();
            if (state.undoStack.length > 15) state.undoStack.shift();
            state.undoStack.push(url);
            
            if (writeToDB) {
                dbManager.save('_active_session_backup', url); // Respaldo temporal automático
                if (state.currentProject) {
                    dbManager.save(state.currentProject, url); // Guarda en el archivo activo si existe
                }
            }
        };

        const undo = () => {
            if (state.undoStack.length > 1) {
                state.undoStack.pop();
                loadImgToCanvas(state.undoStack[state.undoStack.length - 1]);
                setTimeout(() => {
                    dbManager.save('_active_session_backup', canvas.toDataURL());
                    if(state.currentProject) dbManager.save(state.currentProject, canvas.toDataURL());
                }, 50);
            }
        };

        const clearCanvas = (resetProject = true) => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(resetProject) {
                state.currentProject = null;
                localStorage.removeItem('activeProjectName');
            }
            saveState(true);
            renderProjects();
        };

        // --- GESTIÓN DE PROYECTOS (SIDEBAR) ---
        async function saveProjectWorkflow() {
            const name = prompt("Introduce el nombre de tu proyecto:", state.currentProject || "Mi Obra Maestra");
            if (!name || name.trim() === "" || name === '_active_session_backup') return;
            
            const sanitizedName = name.trim();
            await dbManager.save(sanitizedName, canvas.toDataURL());
            state.currentProject = sanitizedName;
            localStorage.setItem('activeProjectName', sanitizedName);
            renderProjects();
        }

        async function renderProjects() {
            const keys = await dbManager.getAllKeys();
            ui.projectList.innerHTML = "";
            
            keys.filter(k => k !== '_active_session_backup').forEach(key => {
                const isActive = state.currentProject === key;
                
                const item = document.createElement('div');
                item.className = `project-item ${isActive ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="project-name" title="${key}">${isActive ? '馃摳 ' : ''}${key}</span>
                    <button class="btn-del" title="Eliminar proyecto">🗑锔</button>
                `;
                
                // Cargar proyecto al hacer clic en la fila
                item.addEventListener('click', async () => {
                    const data = await dbManager.load(key);
                    if (data) {
                        state.currentProject = key;
                        localStorage.setItem('activeProjectName', key);
                        loadImgToCanvas(data);
                        renderProjects();
                    }
                });

                // Botón de eliminar
                item.querySelector('.btn-del').addEventListener('click', async (e) => {
                    e.stopPropagation(); // Evita que se dispare la carga del proyecto
                    if (confirm(`¿Seguro que deseas eliminar el proyecto "${key}"?`)) {
                        await dbManager.delete(key);
                        if (state.currentProject === key) {
                            state.currentProject = null;
                            localStorage.removeItem('activeProjectName');
                        }
                        renderProjects();
                    }
                });

                ui.projectList.appendChild(item);
            });
        }

        // --- MANEJADORES DE EVENTOS ---
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        ['mouseup', 'mouseout'].forEach(evt => canvas.addEventListener(evt, stopDrawing));

        // Sidebar Desplegable / Retráctil
        document.getElementById('btnToggleSidebar').addEventListener('click', () => {
            ui.sidebar.classList.toggle('collapsed');
        });

        // Cambiar herramientas dinámicamente
        document.getElementById('tools').addEventListener('click', (e) => {
            const btn = e.target.closest('.tool-btn');
            if (!btn) return;
            state.tool = btn.dataset.tool;
            ui.tools.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ui.grid.classList.toggle('active', state.tool === 'pixel');
        });

        ui.size.addEventListener('input', e => ui.sizeLabel.textContent = `${e.target.value}px`);
        document.getElementById('btnClear').addEventListener('click', () => clearCanvas(true));
        document.getElementById('btnNewProject').addEventListener('click', () => clearCanvas(true));
        document.getElementById('btnUndo').addEventListener('click', undo);
        document.getElementById('btnSaveProject').addEventListener('click', saveProjectWorkflow);

        // Atajos de Teclado
        document.addEventListener('keydown', e => { 
            if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
            if (e.ctrlKey && e.key.toLowerCase() === 's') { e.preventDefault(); saveProjectWorkflow(); }
        });

        // Descarga de Imagen Local
        document.getElementById('btnSave').addEventListener('click', () => {
            const a = document.createElement('a');
            a.download = state.currentProject ? `${state.currentProject}.png` : 'mipaint_pro.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        });

        // Lanzar aplicación
        initCanvas();
    </script>
</body>
</html>
